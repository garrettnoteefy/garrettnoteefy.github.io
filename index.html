<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noteefy Widget Test</title>
  <script>
    (async () => {
      try {
        const r = await fetch("https://noteefypublic.blob.core.windows.net/widget/scripts/manifest.dev.json", { cache: "no-cache" });
        const { url, integrity } = await r.json();
        const s = document.createElement("script");
        s.src = url;
        s.integrity = integrity;
        s.crossOrigin = "anonymous";
        s.async = true;
        s.onerror = (e) => console.warn("Noteefy widget failed to load", e);
        document.head.appendChild(s);
      } catch (e) {
        console.warn("Noteefy manifest fetch failed", e);
      }
    })();
  </script>
</head>
<body>
  <h1>Noteefy Widget Test Page</h1>
  <p>The widget should load on this page.</p>
</body>
</html>
